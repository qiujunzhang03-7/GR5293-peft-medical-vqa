model_id: "Qwen/Qwen2-VL-2B-Instruct"
dtype: "float16"
load_in_4bit: false

train_split: "train"
train_max_examples: null
eval_split: "test"
eval_max_examples: null

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
use_dora: false

num_epochs: 3
per_device_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0001
weight_decay: 0.0
warmup_ratio: 0.03
max_grad_norm: 1.0
gradient_checkpointing: true

logging_steps: 25
output_dir: "checkpoints/lora_rank16"
seed: 42
cache_dir: null

run_eval_after_training: true
eval_max_new_tokens: 64
