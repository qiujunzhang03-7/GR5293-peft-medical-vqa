# =============================================================================
# LoRA quick run configuration (Member 1, Week 4 deliverable)
# =============================================================================
# Designed to run end-to-end on Colab T4 in <30 minutes.
# Uses a 200-example training subset to validate the pipeline without burning
# Colab quota. Members 2/3 should switch to lora_rank8.yaml for headline runs.

# --- Model ---
model_id: "Qwen/Qwen2-VL-2B-Instruct"
dtype: "float16"
load_in_4bit: false              # Member 2: flip to true for QLoRA

# --- Data ---
train_split: "train"
train_max_examples: 200          # quick run; null = full 1797
eval_split: "test"
eval_max_examples: null          # always evaluate on full test split

# --- LoRA hyperparameters ---
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:                  # attention projections only for the quick run
  - q_proj
  - k_proj
  - v_proj
  - o_proj
use_dora: false                  # Member 3: flip to true for DoRA

# --- Optimization ---
num_epochs: 1
per_device_batch_size: 1
gradient_accumulation_steps: 4   # effective batch size = 4
learning_rate: 1.0e-4
weight_decay: 0.0
warmup_ratio: 0.03
max_grad_norm: 1.0
gradient_checkpointing: true     # essential to fit Qwen2-VL-2B + LoRA on T4

# --- Logging / IO ---
logging_steps: 5
output_dir: "checkpoints/lora_quick"
seed: 42

# --- Eval after training ---
run_eval_after_training: true
eval_max_new_tokens: 64
