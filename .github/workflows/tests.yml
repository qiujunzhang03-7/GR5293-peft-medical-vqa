name: tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      # Don't cancel sibling jobs if one fails
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install lightweight test dependencies
        # We test only the pure-Python modules in CI (metrics, statistical
        # tests, data helpers). Loading the full ML stack and downloading
        # Qwen2-VL-2B (~4 GB) is unnecessary for unit tests.
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy rouge-score

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Report Python and package versions
        if: always()
        run: |
          python --version
          pip list
