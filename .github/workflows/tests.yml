name: tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        # We install CPU-only torch + the minimum stack needed to import
        # src/ modules and run the 85 unit tests. We do NOT download
        # the Qwen2-VL-2B model (~4 GB), since unit tests don't load it.
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch (saves ~2 GB vs CUDA wheels)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Lightweight ML/data deps
          pip install pytest numpy scipy pandas pyyaml rouge-score sacrebleu nltk Pillow
          # Transformers + PEFT (small without weights)
          pip install transformers accelerate peft datasets

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Report Python and package versions
        if: always()
        run: |
          python --version
          pip list
